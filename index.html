:root{
  --ink:#141310; --ink-1:#1c1b15; --ink-2:#25241a;
  --hair:rgba(236,229,214,.065);
  --bone:#ece5d6; --dim:#a69c88; --faint:#746b58;
  --brass:#c89a44; --brass-2:#dcb15c; --brass-soft:rgba(200,154,68,.13);
  --pine:#87a271; --pine-soft:rgba(135,162,113,.16);
  --fd:'Bricolage',ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{background:var(--ink);color:var(--bone);font-family:var(--fd);-webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;letter-spacing:-.01em;}
body{padding-bottom:calc(72px + var(--sab));min-height:100vh;}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;}
input,textarea{font-family:inherit;}
.tab-num{font-feature-settings:"tnum" 1,"lnum" 1;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--brass);}
svg{display:block;}
.wrap{max-width:560px;margin:0 auto;padding:0 22px;}

/* ---- top bar ---- */
.top{display:flex;align-items:center;gap:14px;padding:calc(16px + var(--sat)) 22px 10px;max-width:560px;margin:0 auto;}
.top .ib{width:38px;height:38px;margin-left:-8px;display:flex;align-items:center;justify-content:center;color:var(--dim);border-radius:11px;}
.top .ib:active{background:var(--ink-1);}
.top .ttl{flex:1;min-width:0;}
.top .ttl .k{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);}
.top .ttl .h{font-size:21px;font-weight:750;letter-spacing:-.03em;margin-top:1px;}

/* ---- home ---- */
.hero{padding:14px 0 6px;}
.hero .date{font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);}
.hero .grand{font-size:38px;font-weight:770;letter-spacing:-.04em;line-height:1.02;margin-top:10px;}
.hero .grand em{font-style:normal;color:var(--brass);}
.hero .sub{color:var(--dim);font-size:14.5px;margin-top:10px;font-weight:450;letter-spacing:0;}

.week{display:flex;justify-content:space-between;gap:4px;margin:26px 0 30px;}
.week .c{flex:1;display:flex;flex-direction:column;align-items:center;gap:9px;padding:4px 0;}
.week .c .w{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;}
.week .c .m{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:750;color:var(--faint);}
.week .c.done .m{background:var(--brass-soft);color:var(--brass-2);}
.week .c.today .w{color:var(--brass);}
.week .c.today .m{box-shadow:inset 0 0 0 1.5px var(--brass);}

.days .row{display:flex;align-items:center;gap:20px;padding:22px 2px;position:relative;}
.days .row + .row{box-shadow:inset 0 1px 0 var(--hair);}
.days .row:active{opacity:.7;}
.days .row .glyph{font-size:40px;font-weight:780;letter-spacing:-.05em;color:var(--bone);width:40px;text-align:center;flex:none;line-height:1;}
.days .row.hasp .glyph{color:var(--brass);}
.days .row .mid{flex:1;min-width:0;}
.days .row .mid .nm{font-size:18px;font-weight:680;letter-spacing:-.02em;}
.days .row .mid .fc{font-size:13px;color:var(--dim);margin-top:3px;font-weight:450;letter-spacing:0;}
.days .row .mid .bar{height:3px;border-radius:2px;background:var(--ink-2);margin-top:12px;overflow:hidden;max-width:190px;}
.days .row .mid .bar i{display:block;height:100%;background:var(--brass);border-radius:2px;}
.days .row .go{color:var(--faint);flex:none;}

.foot{color:var(--faint);font-size:12.5px;text-align:center;margin:36px 0 10px;line-height:1.7;font-weight:450;letter-spacing:0;}

/* ---- day ---- */
.dprog{display:flex;align-items:center;gap:14px;padding:6px 0 2px;}
.dprog .line{flex:1;height:3px;border-radius:2px;background:var(--ink-2);overflow:hidden;}
.dprog .line i{display:block;height:100%;background:var(--brass);border-radius:2px;transition:width .4s ease;}
.dprog .txt{font-size:12px;font-weight:600;color:var(--dim);letter-spacing:.02em;flex:none;}

.sec{margin:34px 0 4px;display:flex;align-items:baseline;gap:12px;}
.sec .lab{font-size:11.5px;font-weight:650;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);}
.sec .sub{font-size:11.5px;color:var(--faint);font-weight:450;letter-spacing:.01em;flex:1;}
.sec .ss{font-size:9.5px;font-weight:700;letter-spacing:.14em;color:var(--pine);border:1px solid var(--pine-soft);
  padding:2px 7px;border-radius:20px;text-transform:uppercase;}

.exi{padding:15px 2px;}
.exi + .exi{box-shadow:inset 0 1px 0 var(--hair);}
.exi .hd{display:flex;align-items:center;gap:15px;}
.exi .ck{width:25px;height:25px;flex:none;border-radius:50%;box-shadow:inset 0 0 0 1.6px var(--faint);
  display:flex;align-items:center;justify-content:center;color:transparent;transition:.18s;}
.exi.done .ck{background:var(--pine);box-shadow:none;color:var(--ink);}
.exi .body-nm{flex:1;min-width:0;cursor:pointer;}
.exi .body-nm .n{font-size:15.5px;font-weight:600;letter-spacing:-.015em;line-height:1.25;transition:.2s;}
.exi.done .body-nm .n{color:var(--dim);}
.exi .body-nm .sub{font-size:12.5px;color:var(--dim);margin-top:4px;font-weight:450;letter-spacing:0;}
.exi .body-nm .sub b{color:var(--bone);font-weight:600;}
.exi .caret{color:var(--faint);flex:none;transition:transform .22s;cursor:pointer;}
.exi.open .caret{transform:rotate(90deg);}

.log{display:none;margin-top:16px;background:var(--ink-1);border-radius:16px;padding:18px 16px;animation:rev .22s ease;}
.exi.open .log{display:block;}
@keyframes rev{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}

.last{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding-bottom:15px;margin-bottom:4px;box-shadow:inset 0 -1px 0 var(--hair);}
.last .k{font-size:10px;font-weight:650;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);}
.last .v{font-size:17px;font-weight:700;letter-spacing:-.02em;}
.last .v .u{font-size:12px;color:var(--dim);font-weight:500;}
.last .ago{font-size:11.5px;color:var(--faint);font-weight:450;letter-spacing:0;}
.last.none .v{color:var(--dim);font-size:13.5px;font-weight:450;letter-spacing:0;}

.instr{font-size:13px;color:var(--dim);line-height:1.55;padding:14px 0 6px;font-weight:450;letter-spacing:0;}

.shead{display:grid;grid-template-columns:16px 1fr 1fr 74px;gap:7px;align-items:center;padding:2px 0 7px;}
.shead span{font-size:9.5px;font-weight:650;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);text-align:center;}
.shead span:first-child{text-align:left;}
.setg{display:grid;grid-template-columns:16px 1fr 1fr 74px;gap:7px;align-items:center;padding:5px 0;}
.setg .sn{font-size:12px;font-weight:700;color:var(--brass);text-align:center;}
.stp2{display:flex;align-items:center;background:var(--ink-2);border-radius:11px;overflow:hidden;min-width:0;}

/* ========================= STORAGE ========================= */
const KEY="rutina_daniel_v1", LEGACY="daniel_fit_v1", SCHEMA=2;
let DB=boot();
function boot(){
  let d=read(KEY);
  if(!d){ const old=read(LEGACY); if(old) d=old; }
  if(!d) d={schemaVersion:SCHEMA,sessions:{},settings:{}};
  return migrate(d);
}
function read(k){ try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;} }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){} if(session && !applyingRemote) scheduleSync(); }
function migrate(d){
  d=d||{};
  if(!d.sessions) d.sessions={};
  d.settings=d.settings||{};
  d.body=d.body||[];
  for(const k in d.sessions){ const s=d.sessions[k]; s.ex=s.ex||{}; s.customIds=s.customIds||[];
    for(const id in s.ex){ const e=s.ex[id]; e.sets=e.sets||[]; e.note=e.note||""; e.done=!!e.done; e.nameKey=e.nameKey||slug(e.name||id); } }
  d.schemaVersion=SCHEMA;
  return d;
}

/* ========================= SYNC (Supabase) ========================= */
function initSync(){
  if(!SYNC_ON) return;
  if(!(window.supabase && window.supabase.createClient)){ syncMsg="Sin conexión a la nube."; return; }
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  sb.auth.getSession().then(({data})=>{ session=(data&&data.session)||null; if(session) afterLogin(); else if(V.t==='data') renderData(); });
  sb.auth.onAuthStateChange((_e,s)=>{ session=s||null; if(V.t==='data') renderData(); });
  window.addEventListener('online',()=>{ if(session) pullRemote(); });
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden && session) pullRemote(); });
}
async function doSignIn(email,pw,btn){
  if(!sb){ syncMsg="Sync no disponible."; updateSyncLine(); return; }
  if(!email||!pw){ syncMsg="Escribe correo y contraseña."; updateSyncLine(); return; }
  syncMsg="Entrando…"; updateSyncLine(); if(btn) btn.disabled=true;
  const {error}=await sb.auth.signInWithPassword({email:String(email).trim(),password:pw});
  if(btn) btn.disabled=false;
  if(error){ syncMsg="No se pudo entrar: "+error.message; if(V.t==='data') renderData(); return; }
  const {data}=await sb.auth.getSession(); session=(data&&data.session)||null;
  await afterLogin();
}
async function afterLogin(){ await pullRemote(); await pushRemote(); if(V.t==='data') renderData(); }
async function doSignOut(){ try{ if(sb) await sb.auth.signOut(); }catch(e){} session=null; if(V.t==='data') renderData(); }
async function pullRemote(){
  if(!sb||!session) return;
  syncMsg="Sincronizando…"; updateSyncLine();
  try{
    const {data,error}=await sb.from('workout_data').select('data').eq('id',session.user.id).maybeSingle();
    if(error){ syncMsg="Error: "+error.message; updateSyncLine(); return; }
    if(data && data.data){ applyingRemote=true; DB=migrate(mergeDB(DB,data.data)); try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){} applyingRemote=false; render(); }
    syncMsg="Sincronizado"; updateSyncLine();
  }catch(e){ syncMsg="Sin conexión."; updateSyncLine(); }
}
async function pushRemote(){
  if(!sb||!session) return;
  DB.updatedAt=Date.now();
  const clean={schemaVersion:DB.schemaVersion,settings:DB.settings||{},updatedAt:DB.updatedAt,sessions:{}};
  for(const k in DB.sessions){ if(isTrained(DB.sessions[k])) clean.sessions[k]=DB.sessions[k]; }
  try{
    const {error}=await sb.from('workout_data').upsert({id:session.user.id,data:clean,updated_at:new Date().toISOString()});
    syncMsg=error?("Error: "+error.message):"Sincronizado"; updateSyncLine();
  }catch(e){ syncMsg="Sin conexión."; updateSyncLine(); }
}
function scheduleSync(){ if(!sb||!session) return; clearTimeout(pushTimer); syncMsg="Sincronizando…"; updateSyncLine(); pushTimer=setTimeout(pushRemote,1500); }
function mergeDB(local,remote){
  local=local||{}; remote=remote||{};
  const out={schemaVersion:Math.max(local.schemaVersion||1,remote.schemaVersion||1),
    sessions:{}, settings:Object.assign({},remote.settings||{},local.settings||{}),
    updatedAt:Math.max(local.updatedAt||0,remote.updatedAt||0)};
  const ls=local.sessions||{}, rs=remote.sessions||{};
  const keys=new Set(Object.keys(ls).concat(Object.keys(rs)));
  keys.forEach(k=>{ const a=ls[k], b=rs[k]; out.sessions[k]=(a&&b)?richerSession(a,b):(a||b); });
  return out;
}
function richerSession(a,b){
  const sc=s=>Object.values((s&&s.ex)||{}).reduce((n,e)=>n+(e.done?1:0)+(((e.sets)||[]).filter(x=>x.reps).length),0);
  return sc(b)>sc(a)? b : a;
}
function updateSyncLine(){ const el=document.getElementById('syncline'); if(el) el.textContent=syncMsg; }

/* ========================= HELPERS ========================= */
function today(){const d=new Date();return iso(d);}
function iso(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parseD(s){return new Date(s+"T12:00:00");}
function slug(s){return String(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");}
function eid(day,name){return day+"::"+slug(name);}
function longDate(s){return parseD(s).toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"});}
function shortDate(s){return parseD(s).toLocaleDateString("es-MX",{day:"numeric",month:"short"});}
function daysAgo(s){const a=parseD(today()),b=parseD(s);return Math.round((a-b)/86400000);}
function agoTxt(n){return n<=0?"hoy":n===1?"ayer":"hace "+n+" días";}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function b64e(s){return btoa(unescape(encodeURIComponent(s)));}
function b64d(s){return decodeURIComponent(escape(atob(s)));}

function skey(date,day){return date+"_"+day;}
function getSession(date,day,create){
  const k=skey(date,day);
  if(!DB.sessions[k]){ if(!create) return null; DB.sessions[k]={date,day,ex:{},customIds:[]}; }
  return DB.sessions[k];
}
function seedEx(s,day,it,kind,superset,sectionLabel){
  const id=eid(day,it[0]);
  if(!s.ex[id]) s.ex[id]={nameKey:slug(it[0]),name:it[0],muscle:it[1],
    target:{sets:it[2],reps:it[3],weight:it[4]},instr:it[5],kind,superset:!!superset,sectionLabel,custom:false,sets:[],done:false,note:""};
  return {id,e:s.ex[id]};
}
function isTrained(s){return Object.values(s.ex).some(e=>e.done||(e.sets&&e.sets.some(x=>x.reps)));}
function trainedList(){
  return Object.keys(DB.sessions).map(k=>DB.sessions[k]).filter(isTrained)
    .sort((a,b)=>a.date<b.date?1:-1);
}
function trainedOn(date){
  for(const k in DB.sessions){const s=DB.sessions[k]; if(s.date===date&&isTrained(s)) return s.day;}
  return null;
}
function lastTime(nameKey,exceptKey){
  const keys=Object.keys(DB.sessions).sort((a,b)=>a<b?1:-1);
  for(const k of keys){
    if(k===exceptKey) continue;
    const s=DB.sessions[k];
    for(const id in s.ex){
      const e=s.ex[id];
      if(e.nameKey!==nameKey||!e.sets) continue;
      const w=e.sets.filter(x=>x.reps);
      if(!w.length) continue;
      let best=w[0];
      w.forEach(x=>{const a=parseFloat(x.weight)||0,c=parseFloat(best.weight)||0;
        if(a>c||(a===c&&(parseFloat(x.reps)||0)>(parseFloat(best.reps)||0)))best=x;});
      return {set:best,date:s.date};
    }
  }
  return null;
}

function defReps(e){const m=String(e.target.reps||"").match(/\d+/);return m?m[0]:"";}

function fFocus(id,i,f,el){const e=curEx(id);if(!e.sets[i])return;
  if(e.sets[i][f]===""||e.sets[i][f]==null){const d=f==="reps"?defReps(e):defWeight(e);if(d!==""){e.sets[i][f]=d;el.value=d;save();}}

function nudge(id,i,f,dl){const e=curEx(id);if(!e.sets[i])return;const cur=e.sets[i][f];
  if(cur===""||cur==null||isNaN(parseFloat(cur))){
    let d=f==="reps"?defReps(e):f==="weight"?defWeight(e):8;
    if(d===""||d==null)d=f==="weight"?(dl>0?0.5:0):(dl>0?1:0);
    e.sets[i][f]=(f==="weight")?parseFloat(d):(f==="rpe"?Math.min(10,Math.max(6,parseInt(d))):parseInt(d));
  }else{
    let n=parseFloat(cur)+dl;
    if(f==="rpe")n=Math.min(10,Math.max(6,n));

  }

  TMR.int=setInterval(()=>{TMR.rem--;drawT();fabT();if(TMR.rem<=0){stopT();ding();}},1000);}

  try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=784;g.gain.setValueAtTime(.18,a.currentTime);o.start();g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.5);o.stop(a.currentTime+.5);}catch(e){}

/* ========================= ANÁLISIS ========================= */
let anRange="30"; // 7 | 30 | 90 | all
function stripAcc(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
const MUSGRP=[
  [/biceps|braq/,"Bíceps"],[/triceps/,"Tríceps"],[/pecho/,"Pecho"],
  [/hombro/,"Hombros"],[/espalda|dorsal|trapecio|remo/,"Espalda"],
  [/cuadriceps|cuad|vmo/,"Cuádriceps"],[/isquio|gluteo/,"Glúteos e isquios"],
  [/pantorrilla|gemelo/,"Pantorrillas"],[/antebrazo|agarre|muneca/,"Antebrazo"],
  [/core|abdom|lumbar|estabil|oblicuo|bird|dead/,"Core"]
];
function musGroup(m){
  const first=stripAcc(String(m||"").split("/")[0]); const whole=stripAcc(m);
  for(const [re,g] of MUSGRP){ if(re.test(first)) return g; }
  for(const [re,g] of MUSGRP){ if(re.test(whole)) return g; }
  return "Otro";
}
function rangeDays(r){return r==="7"?7:r==="30"?30:r==="90"?90:null;}
function rangeLabel(r){return r==="7"?"últimos 7 días":r==="30"?"últimos 30 días":r==="90"?"últimos 90 días":"todo el historial";}
function inRange(dateStr,r){const d=rangeDays(r);return d==null?true:daysAgo(dateStr)<d;}
function sessionsIn(r){return trainedList().filter(s=>inRange(s.date,r));}
function bestSet(sets){const w=(sets||[]).filter(x=>x.reps);if(!w.length)return null;let b=w[0];
  w.forEach(x=>{const a=parseFloat(x.weight)||0,c=parseFloat(b.weight)||0;if(a>c||(a===c&&(parseFloat(x.reps)||0)>(parseFloat(b.reps)||0)))b=x;});return b;}
function analyze(r){
  const ss=sessionsIn(r);const byMuscle={};let totVol=0,totSets=0,totReps=0;const exMap={};
  ss.forEach(s=>{Object.values(s.ex).forEach(e=>{
    const logged=(e.sets||[]).filter(x=>x.reps);if(!logged.length)return;
    const g=musGroup(e.muscle);let vol=0;logged.forEach(x=>vol+=(parseFloat(x.weight)||0)*(parseFloat(x.reps)||0));
    const reps=logged.reduce((a,x)=>a+(parseFloat(x.reps)||0),0);
    byMuscle[g]=byMuscle[g]||{sets:0,vol:0,reps:0};byMuscle[g].sets+=logged.length;byMuscle[g].vol+=vol;byMuscle[g].reps+=reps;
    totVol+=vol;totSets+=logged.length;totReps+=reps;
    const nk=e.nameKey||slug(e.name);exMap[nk]=exMap[nk]||{name:e.name,muscle:e.muscle,entries:[]};
    exMap[nk].entries.push({date:s.date,best:bestSet(e.sets),sets:logged.length,vol});
  });});
  let weeks;const d=rangeDays(r);
  if(d)weeks=d/7;else{if(ss.length){const oldest=ss.reduce((m,s)=>s.date<m?s.date:m,ss[0].date);weeks=Math.max(1,(daysAgo(oldest)+1)/7);}else weeks=1;}
  return {ss,byMuscle,totVol,totSets,totReps,weeks,exMap};
}
function prevWindowVol(r){const d=rangeDays(r);if(!d)return null;let vol=0;
  trainedList().forEach(s=>{const ago=daysAgo(s.date);if(ago>=d&&ago<2*d){Object.values(s.ex).forEach(e=>{(e.sets||[]).filter(x=>x.reps).forEach(x=>vol+=(parseFloat(x.weight)||0)*(parseFloat(x.reps)||0));});}});return vol;}
function allPRs(){const pr={};
  trainedList().forEach(s=>{Object.values(s.ex).forEach(e=>{const b=bestSet(e.sets);if(!b)return;const nk=e.nameKey||slug(e.name);const w=parseFloat(b.weight)||0;
    if(!pr[nk]||w>pr[nk].w||(w===pr[nk].w&&(parseFloat(b.reps)||0)>pr[nk].reps))pr[nk]={name:e.name,w,reps:parseFloat(b.reps)||0,weight:b.weight,rawReps:b.reps,date:s.date,rpe:b.rpe};});});
  return Object.values(pr).filter(p=>p.w>0).sort((a,b)=>b.w-a.w);}
const MOLRE=/(dolor|duele|molest|incomod|trono|truena|tiron|calambre|punz|rigid|tension|inflam|pinch|jalon)/;

function genInsights(r){
  const A=analyze(r);const out=[];
  const priority=["Bíceps","Tríceps","Hombros","Espalda","Pecho","Cuádriceps","Glúteos e isquios","Pantorrillas"];
  const isArmShoulderBack=g=>["Bíceps","Tríceps","Hombros","Espalda"].includes(g);
  priority.forEach(g=>{const m=A.byMuscle[g];const spw=m?m.sets/A.weeks:0;
    if(spw<0.5){if(isArmShoulderBack(g)&&A.ss.length)out.push({t:'warn',txt:g+': casi sin volumen. Es de tus prioridades — súmale series.'});}
    else if(spw<6)out.push({t:'warn',txt:g+': ~'+spw.toFixed(0)+' series/semana, por debajo del rango ideal (10–20). Agrega 1–2 series.'});
    else if(spw<10)out.push({t:'info',txt:g+': ~'+spw.toFixed(0)+' series/semana, un poco corto. Puedes subir hacia 10–20.'});
    else if(spw<=20)out.push({t:'good',txt:g+': ~'+spw.toFixed(0)+' series/semana, dentro del rango ideal.'});
    else out.push({t:'info',txt:g+': ~'+spw.toFixed(0)+' series/semana, alto. Vigila recuperación y calidad.'});});
  const spw=A.ss.length/A.weeks;
  if(!A.ss.length)out.push({t:'info',txt:'Aún no hay entrenamientos en este periodo.'});
  else if(spw<2.3)out.push({t:'warn',txt:'Constancia: ~'+spw.toFixed(1)+' sesiones/semana. Tu plan pide 3 — intenta cerrar la semana.'});
  else out.push({t:'good',txt:'Constancia: ~'+spw.toFixed(1)+' sesiones/semana. Buen ritmo.'});
  Object.values(A.exMap).forEach(x=>{if(x.entries.length>=3){
    const e=x.entries.slice().sort((a,b)=>a.date<b.date?-1:1);const last3=e.slice(-3).map(y=>parseFloat(y.best&&y.best.weight)||0);
    if(last3[0]>0&&last3.every(v=>v===last3[0]))out.push({t:'info',txt:x.name+': mismo peso ('+last3[0]+' kg) 3 sesiones seguidas. Si llegas al tope de reps, sube '+(last3[0]<10?'0.5':'2.5')+' kg.'});}});
  ORDER.forEach(day=>{let last=null;for(const s of trainedList()){if(s.day===day){last=s.date;break;}}if(last===null)return;
    const ago=daysAgo(last);const dn=R[day]?R[day].name:day;if(ago>=9)out.push({t:'warn',txt:'Día '+day+' ('+dn+'): sin entrenar hace '+ago+' días. No lo dejes caer.'});});

}

  if(wv.length){const first=b.find(x=>parseFloat(x.weight)),last=[...b].reverse().find(x=>parseFloat(x.weight));const d=parseFloat(last.weight)-parseFloat(first.weight);
    html+='<div class="bhero"><div class="bw tab-num">'+esc(last.weight)+' <i>kg</i></div>'+
      '<div class="bmeta"><div class="bgoal">Meta 77 kg</div>'+(wv.length>1?'<div class="bd '+(d>=0?'up':'dn')+'">'+(d>=0?'+':'')+d.toFixed(1)+' kg desde '+shortDate(first.date)+'</div>':'')+'</div></div>';
    if(wv.length>1)html+='<div class="spkw">'+sparkline(wv)+'</div>';}
  // latest measurements grid
  const lastM=b[b.length-1];
  const cells=[["Brazo",lastM.arm],["Hombro",lastM.shoulder],["Pecho",lastM.chest],["Cintura",lastM.waist]].filter(c=>c[1]);
  if(cells.length){html+='<div class="asec"><div class="ahd">'+ico('ruler',16)+' Últimas medidas</div><div class="mgrid">'+
    cells.map(c=>'<div class="mcell"><div class="mcn tab-num">'+esc(c[1])+' <i>cm</i></div><div class="mcl">'+c[0]+'</div></div>').join("")+'</div></div>';}
  // history
  html+='<div class="asec"><div class="ahd">'+ico('cal',16)+' Historial</div>';
  b.slice().reverse().forEach(x=>{const parts=[x.weight&&x.weight+' kg',x.arm&&'brazo '+x.arm,x.shoulder&&'hombro '+x.shoulder,x.chest&&'pecho '+x.chest,x.waist&&'cintura '+x.waist].filter(Boolean).join(' · ');
    html+='<div class="bentry"><div class="bdate tab-num">'+shortDate(x.date)+'</div><div class="bvals">'+esc(parts)+(x.note?'<i>'+esc(x.note)+'</i>':'')+'</div><button class="bdel" onclick="delBody(\''+x.date+'\')">'+ico('trash',16)+'</button></div>';});
  html+='</div></div>';app.innerHTML=html;
}

  ov('bodySheet','<div class="xh"><h2>Registrar cuerpo</h2><button class="x" onclick="closeOv(\'bodySheet\')">'+ico('x',22)+'</button></div>'+
    '<div class="field"><div class="fl">Fecha</div><input id="b-date" type="date" value="'+t+'"></div>'+
    '<div class="field"><div class="fl">Peso corporal (kg)</div><input id="b-weight" inputmode="decimal" placeholder="77"></div>'+
    '<div class="row3"><div class="field"><div class="fl">Brazo (cm)</div><input id="b-arm" inputmode="decimal"></div>'+
    '<div class="field"><div class="fl">Hombro (cm)</div><input id="b-sho" inputmode="decimal"></div>'+
    '<div class="field"><div class="fl">Pecho (cm)</div><input id="b-che" inputmode="decimal"></div></div>'+

function addBody(){const g=id=>{const el=document.getElementById(id);return el?el.value.trim():"";};
  const date=g("b-date")||today();
  const entry={date,weight:g("b-weight"),arm:g("b-arm"),shoulder:g("b-sho"),chest:g("b-che"),waist:g("b-wai"),note:g("b-note")};
  if(!entry.weight&&!entry.arm&&!entry.shoulder&&!entry.chest&&!entry.waist){const el=document.getElementById("b-weight");if(el)el.focus();return;}
  DB.body=DB.body||[];const i=DB.body.findIndex(x=>x.date===date);if(i>=0)DB.body[i]=entry;else DB.body.push(entry);
  DB.body.sort((a,b)=>a.date<b.date?-1:1);save();closeOv("bodySheet");renderBody();}
function delBody(date){if(!confirm("¿Borrar este registro de cuerpo?"))return;DB.body=(DB.body||[]).filter(x=>x.date!==date);save();renderBody();}
function buildReport(r){
  const A=analyze(r);const pr=allPRs();const mol=molestias(r);const ins=genInsights(r);const L=[];
  L.push("# Reporte de entrenamiento — Daniel");L.push("");
  L.push("**Periodo:** "+rangeLabel(r)+"  ·  **Generado:** "+today());L.push("");
  L.push("**Contexto:** ectomorfo, 1.81 m, meta 75→77 kg. Prioridades: 1) brazos (bíceps/tríceps), 2) hombros, 3) espalda, 4) abdomen, 5) movilidad, 6) fuerza funcional, 7) pantorrillas, 8) reducir pecho. Entrena en casa con mancuernas (usualmente 7.5 kg/mano), 3 días Empuje/Pierna/Jale.");L.push("");
  const spw=A.ss.length/A.weeks;
  L.push("## Resumen");
  L.push("- Sesiones: "+A.ss.length+" ("+spw.toFixed(1)+"/semana)");
  L.push("- Volumen total: "+Math.round(A.totVol)+" kg·rep · "+A.totSets+" series · "+A.totReps+" reps");
  const pv=prevWindowVol(r);if(pv!=null&&pv>0){const dp=Math.round((A.totVol-pv)/pv*100);L.push("- Tendencia de volumen vs periodo anterior: "+(dp>=0?"+":"")+dp+"%");}
  L.push("");
  L.push("## Series por grupo muscular (series/semana)");
  const groups=Object.keys(A.byMuscle).sort((a,b)=>A.byMuscle[b].sets-A.byMuscle[a].sets);const dias=rangeDays(r);
  if(!groups.length)L.push("- (sin series registradas)");
  groups.forEach(g=>{const m=A.byMuscle[g];const s=m.sets/A.weeks;let flag="";if(dias){if(s<10)flag=" — por debajo de 10–20";else if(s>20)flag=" — por encima de 20";else flag=" — dentro de 10–20";}
    L.push("- "+g+": "+m.sets+" series"+(dias?" ("+s.toFixed(1)+"/sem)":"")+flag+" · "+Math.round(m.vol)+" kg·rep");});
  L.push("");
  L.push("## Progresión por ejercicio (primer → último registro del periodo)");
  const prog=Object.values(A.exMap).filter(x=>x.entries.length>=2);
  if(!prog.length)L.push("- (aún sin suficientes datos para comparar)");
  prog.forEach(x=>{const e=x.entries.slice().sort((a,b)=>a.date<b.date?-1:1);const f=e[0].best,l=e[e.length-1].best;if(!f||!l)return;const fw=parseFloat(f.weight)||0,lw=parseFloat(l.weight)||0;const ar=lw>fw?"▲":lw<fw?"▼":"=";
    L.push("- "+x.name+": "+(f.weight||"—")+" kg × "+(f.reps||"—")+" → "+(l.weight||"—")+" kg × "+(l.reps||"—")+"  "+ar);});
  L.push("");
  L.push("## Récords personales (histórico)");
  if(!pr.length)L.push("- (sin récords con peso aún)");
  pr.slice(0,12).forEach(p=>L.push("- "+p.name+": "+p.weight+" kg × "+p.rawReps+(p.rpe?" · RPE "+p.rpe:"")+" ("+shortDate(p.date)+")"));
  L.push("");
  L.push("## Molestias registradas en el periodo");
  if(!mol.length)L.push("- (ninguna)");
  mol.forEach(m=>L.push("- "+shortDate(m.date)+" · "+m.name+": "+m.note));
  L.push("");
  L.push("## Señales automáticas de la app");
  ins.forEach(i=>L.push("- ["+(i.t==='warn'?'!':i.t==='good'?'ok':'·')+"] "+i.txt));
  L.push("");
  if((DB.body||[]).length){const b=DB.body.slice().sort((a,b)=>a.date<b.date?-1:1);const last=b[b.length-1],first=b[0];
    L.push("## Cuerpo");
    L.push("- Último ("+shortDate(last.date)+"): "+[last.weight&&last.weight+" kg",last.arm&&"brazo "+last.arm,last.shoulder&&"hombro "+last.shoulder,last.chest&&"pecho "+last.chest,last.waist&&"cintura "+last.waist].filter(Boolean).join(" · "));
    if(first!==last&&first.weight&&last.weight)L.push("- Peso: "+first.weight+" → "+last.weight+" kg desde "+shortDate(first.date));L.push("");}
  L.push("---");
  L.push("Con base en estos datos, dame feedback como coach: qué está funcionando, qué ajustar (peso, reps o ejercicios), en qué grupo muscular enfocarme más según mis prioridades, si conviene cambiar algún ejercicio, y cuándo hacer una semana de descarga (deload). Sé específico.");
  return L.join("\n");
}
function openReport(r){const txt=buildReport(r);
  ov('repSheet','<div class="xh"><h2>Exportar para revisión</h2><button class="x" onclick="closeOv(\'repSheet\')">'+ico('x',22)+'</button></div>'+
    '<p class="rp-help">Copia este reporte y pégalo en un chat conmigo para recibir feedback especializado sobre tu progreso.</p>'+
    '<textarea id="rep-txt" class="rep-txt" readonly>'+esc(txt)+'</textarea>'+
    '<div class="tctl"><button class="b" onclick="dlReport()">Descargar .md</button><button class="a" onclick="copyReport(this)">Copiar</button></div>');
  setTimeout(()=>{const t=document.getElementById("rep-txt");if(t){t.focus();t.select();}},50);}
function copyReport(btn){const t=document.getElementById("rep-txt");if(!t)return;t.select();
  const done=()=>{btn.textContent="¡Copiado!";setTimeout(()=>{btn.textContent="Copiar";},1500);};
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t.value).then(done,()=>{try{document.execCommand("copy");done();}catch(_){}});
  else{try{document.execCommand("copy");done();}catch(_){}}}
function dlReport(){dl("reporte-entrenamiento-"+today()+".md",buildReport(anRange),"text/markdown;charset=utf-8");}
