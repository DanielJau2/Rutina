:root{
  --acc:#c89a44; --acc2:#a87f30; --acc3:#dcb15c;
  --grad:linear-gradient(155deg,#dcb15c 0%,#c89a44 55%,#a87f30 100%);
  --green:#7f9f68; --red:#cf7a5c;
  --fd:'Bricolage',ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --fb:var(--fd);
  --safeb:env(safe-area-inset-bottom,0px); --safet:env(safe-area-inset-top,0px);
  --tabh:86px;
  --brass:var(--acc); --brass-2:var(--acc3); --brass-soft:rgba(200,154,68,.14);
  --pine:var(--green); --pine-soft:rgba(127,159,104,.18);
}
:root, [data-theme="light"]{
  --ink:#f7f5f0; --ink-1:#ffffff; --ink-2:#efece3; --panel:#ffffff; --panel2:#efece3; --line:#e6e1d4;
  --bg:#f7f5f0; --bone:#221f18; --text:#221f18; --dim:#726b57; --faint:#a49b83;
  --hair:rgba(40,35,20,.07);
  --shadow:0 6px 16px rgba(70,60,30,.07);
  --glassbar:rgba(255,255,255,.46); --glassbrd:rgba(255,255,255,.72); --glasshadow:0 10px 30px rgba(80,68,30,.14);
  --sheetbg:rgba(250,248,243,.92); --scrim:rgba(40,35,20,.32);
}
[data-theme="dark"]{
  --ink:#141310; --ink-1:#1c1b15; --ink-2:#25241a; --panel:#1c1b15; --panel2:#25241a; --line:#2f2d22;
  --bg:#141310; --bone:#ece5d6; --text:#ece5d6; --dim:#a69c88; --faint:#746b58;
  --hair:rgba(236,229,214,.07);
  --shadow:0 6px 16px rgba(0,0,0,.28);
  --glassbar:rgba(28,27,21,.42); --glassbrd:rgba(236,229,214,.12); --glasshadow:0 10px 30px rgba(0,0,0,.42);
  --sheetbg:rgba(24,22,16,.94); --scrim:rgba(6,5,2,.55);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html{overflow-x:clip;}
html,body{background:var(--ink);color:var(--bone);font-family:var(--fd);-webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;overscroll-behavior-y:contain;overflow-x:clip;letter-spacing:-.01em;}
body{padding-bottom:calc(var(--safeb) + var(--tabh) + 10px);min-height:100vh;}
html.theming, html.theming *, html.theming *::before, html.theming *::after{
  transition:background-color .16s ease,background .16s ease,border-color .16s ease,box-shadow .16s ease,fill .16s ease!important;}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0;touch-action:manipulation;}
input,textarea,select{font-family:inherit;color:inherit;}
input:focus,textarea:focus,select:focus{outline:none;}
::placeholder{color:var(--faint);}
.hide{display:none!important;}
svg{display:block;}
.tab-num{font-feature-settings:"tnum" 1,"lnum" 1;}
.wrap{max-width:560px;margin:0 auto;padding:0 20px;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);}

/* micro-interacciones */
.exi .ck,.serctl button,.tpre button,.tctl button,.dbtn,.primary,.cmp,.stp2 b,.rp2 b,.ib,.hrow,.days .row,.cal .cell.tap,.calnav button,.arange button{
  transition:transform .13s cubic-bezier(.2,.9,.3,1.3),background .16s ease,color .16s ease,box-shadow .16s ease,opacity .16s ease;}
.ib:active,.calnav button:active,.stp2 b:active,.rp2 b:active{transform:scale(.9);}
.dbtn:active,.primary:active,.cmp:active,.tpre button:active,.tctl button:active,.serctl button:active{transform:scale(.97);}
.days .row:active,.hrow:active{transform:scale(.99);}
#app.viewfade{animation:vin .16s ease-out both;}
@keyframes vin{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

/* top bar */
.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
  padding:calc(14px + var(--safet)) 20px 10px;max-width:560px;margin:0 auto;
  background:linear-gradient(var(--ink) 72%, transparent);}
.top .ib{width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--dim);
  border-radius:13px;background:var(--panel);box-shadow:var(--shadow);flex:none;}
.top .ib:active{background:var(--panel2);}
.top .ib.plain{background:none;box-shadow:none;margin-left:-8px;}
.top .ttl{flex:1;min-width:0;}
.top .ttl .k{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--acc);}
.top .ttl .h{font-size:21px;font-weight:750;letter-spacing:-.03em;margin-top:1px;}
.top .ttl .brand{font-family:var(--fd);font-weight:800;font-size:22px;letter-spacing:-.03em;}
.top .rgt{display:flex;align-items:center;gap:8px;flex:none;}
.top .del:active{color:var(--red);}

/* home */
.hero{padding:14px 0 6px;}
.hero .date{font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);}
.hero .grand{font-size:38px;font-weight:770;letter-spacing:-.04em;line-height:1.02;margin-top:10px;}
.hero .grand em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero .sub{color:var(--dim);font-size:14.5px;margin-top:10px;font-weight:450;letter-spacing:0;}
.week{display:flex;justify-content:space-between;gap:4px;margin:26px 0 30px;}
.week .c{flex:1;display:flex;flex-direction:column;align-items:center;gap:9px;padding:4px 0;}
.week .c .w{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;}
.week .c .m{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:750;color:var(--faint);}
.week .c.done .m{background:var(--brass-soft);color:var(--acc);}
.week .c.today .w{color:var(--acc);}
.week .c.today .m{box-shadow:inset 0 0 0 1.5px var(--acc);}
.days{background:var(--panel);border-radius:22px;padding:6px 16px;box-shadow:var(--shadow);}
.days .row{display:flex;align-items:center;gap:20px;padding:20px 2px;position:relative;}
.days .row + .row{box-shadow:inset 0 1px 0 var(--line);}
.days .row .glyph{font-size:38px;font-weight:780;letter-spacing:-.05em;color:var(--faint);width:40px;text-align:center;flex:none;line-height:1;}
.days .row.hasp .glyph{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.days .row .mid{flex:1;min-width:0;}
.days .row .mid .nm{font-size:18px;font-weight:680;letter-spacing:-.02em;}
.days .row .mid .fc{font-size:13px;color:var(--dim);margin-top:3px;font-weight:450;letter-spacing:0;}
.days .row .mid .bar{height:4px;border-radius:2px;background:var(--panel2);margin-top:12px;overflow:hidden;max-width:190px;}
.days .row .mid .bar i{display:block;height:100%;background:var(--grad);border-radius:2px;}
.days .row .go{color:var(--faint);flex:none;}
.foot{color:var(--faint);font-size:12.5px;text-align:center;margin:32px 0 10px;line-height:1.7;font-weight:450;letter-spacing:0;}

/* day */
.dprog{display:flex;align-items:center;gap:14px;padding:6px 0 2px;}
.dprog .line{flex:1;height:4px;border-radius:2px;background:var(--panel2);overflow:hidden;}
.dprog .line i{display:block;height:100%;background:var(--grad);border-radius:2px;transition:width .4s ease;}
.dprog .txt{font-size:12px;font-weight:600;color:var(--dim);letter-spacing:.02em;flex:none;}
.sec{margin:32px 0 4px;display:flex;align-items:baseline;gap:12px;}
.sec .lab{font-size:11.5px;font-weight:650;letter-spacing:.2em;text-transform:uppercase;color:var(--acc);}
.sec .sub{font-size:11.5px;color:var(--faint);font-weight:450;letter-spacing:.01em;flex:1;}
.sec .ss{font-size:9.5px;font-weight:700;letter-spacing:.14em;color:var(--green);border:1px solid var(--pine-soft);
  padding:2px 7px;border-radius:20px;text-transform:uppercase;}
.exi{padding:15px 16px;background:var(--panel);border-radius:18px;margin-top:9px;box-shadow:var(--shadow);}
.exi .hd{display:flex;align-items:center;gap:15px;}
.exi .ck{width:26px;height:26px;flex:none;border-radius:50%;box-shadow:inset 0 0 0 1.6px var(--faint);
  display:flex;align-items:center;justify-content:center;color:transparent;}
.exi.done .ck{background:var(--green);box-shadow:none;color:#fff;}
.exi .ck:active{transform:scale(.88);}
.exi .body-nm{flex:1;min-width:0;cursor:pointer;}
.exi .body-nm .n{font-size:15.5px;font-weight:600;letter-spacing:-.015em;line-height:1.25;transition:.2s;}
.exi.done .body-nm .n{color:var(--dim);}
.exi .body-nm .sub{font-size:12.5px;color:var(--dim);margin-top:4px;font-weight:450;letter-spacing:0;}
.exi .body-nm .sub b{color:var(--bone);font-weight:600;}
.exi .caret{color:var(--faint);flex:none;transition:transform .22s;cursor:pointer;}
.exi.open .caret{transform:rotate(90deg);}
.log{display:none;margin-top:16px;background:var(--panel2);border-radius:16px;padding:18px 16px;animation:rev .22s ease;}
.exi.open .log{display:block;}
@keyframes rev{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
.last{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding-bottom:15px;margin-bottom:4px;box-shadow:inset 0 -1px 0 var(--line);}
.last .k{font-size:10px;font-weight:650;letter-spacing:.2em;text-transform:uppercase;color:var(--acc);}
.last .v{font-size:17px;font-weight:700;letter-spacing:-.02em;}
.last .v .u{font-size:12px;color:var(--dim);font-weight:500;}
.last .ago{font-size:11.5px;color:var(--faint);font-weight:450;letter-spacing:0;}
.last.none .v{color:var(--dim);font-size:13.5px;font-weight:450;letter-spacing:0;}
.instr{font-size:13px;color:var(--dim);line-height:1.55;padding:14px 0 6px;font-weight:450;letter-spacing:0;}
.shead{display:grid;grid-template-columns:16px 1fr 1fr 74px;gap:7px;align-items:center;padding:2px 0 7px;}
.shead span{font-size:9.5px;font-weight:650;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);text-align:center;}
.shead span:first-child{text-align:left;}
.setg{display:grid;grid-template-columns:16px 1fr 1fr 74px;gap:7px;align-items:center;padding:5px 0;}
.setg .sn{font-size:12px;font-weight:700;color:var(--acc);text-align:center;}
.stp2{display:flex;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden;min-width:0;}
.stp2 b{width:30px;height:42px;font-size:20px;font-weight:400;color:var(--dim);display:flex;align-items:center;justify-content:center;flex:none;}
.stp2 b:active{background:var(--panel2);color:var(--bone);}
.stp2 input{flex:1;width:100%;min-width:0;height:42px;text-align:center;background:none;border:none;outline:none;
  color:var(--bone);font-size:16px;font-weight:700;font-family:var(--fd);letter-spacing:-.02em;}
.stp2 input::placeholder{color:var(--faint);font-weight:500;}
.rp2{display:flex;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden;}
.rp2 b{width:23px;height:42px;font-size:17px;color:var(--dim);display:flex;align-items:center;justify-content:center;flex:none;}
.rp2 b:active{background:var(--panel2);color:var(--bone);}
.rp2 span{flex:1;text-align:center;font-size:15px;font-weight:750;color:var(--acc3);}
.rp2 span.e{color:var(--faint);font-weight:500;}
.serctl{display:flex;gap:8px;margin-top:12px;}
.serctl button{flex:1;padding:11px;border-radius:11px;background:var(--panel);box-shadow:inset 0 0 0 1px var(--line);
  color:var(--dim);font-size:12.5px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:.01em;}
.serctl button:active{background:var(--panel2);}
.serctl button:disabled{opacity:.35;}
.ntbtn{padding:16px 0 2px;font-size:12.5px;font-weight:600;color:var(--faint);display:flex;align-items:center;gap:6px;letter-spacing:.01em;}
.ntbtn:active{color:var(--bone);}
.nt{display:none;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;color:var(--bone);font-size:13.5px;padding:13px;
  margin-top:10px;resize:vertical;min-height:46px;outline:none;font-weight:450;letter-spacing:0;line-height:1.5;}
.nt.shown{display:block;}
.nt::placeholder{color:var(--faint);}
.cmp{width:100%;padding:14px;border-radius:12px;background:var(--grad);color:#fff;font-size:14.5px;font-weight:750;
  margin-top:16px;letter-spacing:-.01em;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 16px rgba(0,0,0,.14);}
.exi.done .cmp{background:transparent;box-shadow:inset 0 0 0 1px var(--pine-soft);color:var(--green);}
.addex{width:100%;margin:26px 0 8px;padding:16px;border-radius:14px;background:var(--panel);box-shadow:var(--shadow);
  color:var(--dim);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:9px;letter-spacing:.01em;}
.addex:active{background:var(--panel2);}

/* rest timer fab + sheet */
.fab{position:fixed;right:20px;bottom:calc(var(--safeb) + var(--tabh) + 8px);z-index:35;height:50px;padding:0 20px;border-radius:40px;
  background:var(--grad);color:#fff;font-size:14.5px;font-weight:750;display:flex;align-items:center;gap:9px;
  box-shadow:0 10px 26px rgba(0,0,0,.3);letter-spacing:-.01em;transition:transform .14s ease;}
.fab:active{transform:scale(.95);}
.fab svg{width:19px;height:19px;}

/* sheets/modals */
.ov{position:fixed;inset:0;z-index:50;background:var(--scrim);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);display:none;align-items:flex-end;justify-content:center;}
.ov.on{display:flex;}
.ov.closing{opacity:0;transition:opacity .18s ease;}
.sh{position:relative;background:var(--sheetbg);backdrop-filter:blur(28px) saturate(1.3);-webkit-backdrop-filter:blur(28px) saturate(1.3);
  border:1px solid var(--glassbrd);width:100%;max-width:560px;margin:0 auto;max-height:88vh;overflow:auto;overscroll-behavior:contain;touch-action:pan-y;
  border-radius:28px 28px 0 0;padding:12px 22px calc(28px + var(--safeb));animation:up .26s cubic-bezier(.2,.9,.3,1);box-shadow:0 -18px 50px rgba(0,0,0,.28);}
.ov.closing .sh{transition:transform .2s cubic-bezier(.5,0,.8,.5);transform:translateY(105%);}
@keyframes up{from{transform:translateY(30px);opacity:.6;}to{transform:none;opacity:1;}}
.grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px;}
.sh .xh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.sh .xh h2{font-size:21px;font-weight:760;letter-spacing:-.03em;}
.sh .x{color:var(--dim);width:38px;height:38px;border-radius:14px;background:var(--panel);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;}
.sh .x:active{background:var(--panel2);}
.tdisp{text-align:center;font-size:76px;font-weight:600;letter-spacing:-.04em;margin:6px 0 22px;line-height:1;}
.tpre{display:flex;gap:10px;margin-bottom:12px;}
.tpre button{flex:1;padding:16px 0;border-radius:14px;background:var(--panel2);font-size:16px;font-weight:750;letter-spacing:-.02em;}
.tpre button:active{background:var(--grad);color:#fff;}
.tctl{display:flex;gap:10px;}
.tctl button{flex:1;padding:15px 0;border-radius:14px;font-size:14px;font-weight:700;}
.tctl .a{background:var(--grad);color:#fff;}
.tctl .b{background:var(--panel2);color:var(--dim);}
.field{margin-bottom:14px;}
.field .fl{font-size:11px;font-weight:650;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:7px;}
.field input{width:100%;height:48px;background:var(--panel);border:1px solid var(--line);border-radius:12px;color:var(--bone);
  font-size:16px;font-weight:600;padding:0 14px;outline:none;letter-spacing:-.01em;}
.field input::placeholder{color:var(--faint);font-weight:450;}
.row3{display:flex;gap:10px;}
.row3 .field{flex:1;}
.primary{width:100%;padding:15px;border-radius:13px;background:var(--grad);color:#fff;font-size:15px;font-weight:750;margin-top:6px;letter-spacing:-.01em;box-shadow:0 8px 20px rgba(0,0,0,.16);}

/* history */
.stats{display:flex;gap:10px;margin:16px 0 26px;}
.stats .s{flex:1;background:var(--panel);border-radius:18px;padding:16px 14px;box-shadow:var(--shadow);}
.stats .s .n{font-size:30px;font-weight:770;letter-spacing:-.04em;line-height:1;}
.stats .s .l{font-size:11px;color:var(--dim);font-weight:500;margin-top:7px;letter-spacing:.02em;}
.calnav{display:flex;align-items:center;justify-content:space-between;margin:8px 0 16px;}
.calnav .mo{font-size:16px;font-weight:700;letter-spacing:-.02em;text-transform:capitalize;}
.calnav button{color:var(--dim);width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:var(--panel);box-shadow:var(--shadow);}
.calnav button:active{background:var(--panel2);}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;background:var(--panel);border-radius:20px;padding:14px;box-shadow:var(--shadow);}
.cal .dh{text-align:center;font-size:10px;font-weight:600;color:var(--faint);letter-spacing:.06em;padding-bottom:4px;text-transform:uppercase;}
.cal .cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;gap:2px;background:var(--panel2);}
.cal .cell .dn{font-size:12.5px;font-weight:550;color:var(--faint);}
.cal .cell.has{background:var(--grad);}
.cal .cell.has .dn{color:#fff;font-weight:750;}
.cal .cell.has .lt{font-size:8.5px;font-weight:750;letter-spacing:.08em;color:rgba(255,255,255,.85);text-transform:uppercase;}
.cal .cell.today{box-shadow:inset 0 0 0 1.5px var(--acc);}
.cal .cell.tap:active{opacity:.6;}
.cal .cell.blank{background:none;}
.hlist{margin-top:26px;}
.hrow{display:flex;align-items:center;gap:16px;padding:15px 16px;background:var(--panel);border-radius:16px;margin-bottom:8px;box-shadow:var(--shadow);}
.hrow .lg{font-size:22px;font-weight:770;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;width:26px;text-align:center;flex:none;letter-spacing:-.03em;}
.hrow .mid{flex:1;min-width:0;}
.hrow .mid .d{font-size:14.5px;font-weight:650;letter-spacing:-.01em;text-transform:capitalize;}
.hrow .mid .x{font-size:12.5px;color:var(--dim);margin-top:3px;font-weight:450;letter-spacing:0;}
.detrow{display:flex;justify-content:space-between;gap:12px;padding:12px 0;box-shadow:inset 0 -1px 0 var(--line);}
.detrow .en{font-size:14px;font-weight:600;letter-spacing:-.01em;flex:1;}
.detrow .es{font-size:13px;color:var(--dim);font-weight:500;text-align:right;flex:none;letter-spacing:0;}
.detrow .enote{font-size:12px;color:var(--faint);margin-top:4px;font-weight:450;letter-spacing:0;line-height:1.4;}

/* data */
.dblk{margin:24px 0;background:var(--panel);border-radius:20px;padding:18px;box-shadow:var(--shadow);}
.dblk h3{font-size:11.5px;font-weight:650;letter-spacing:.2em;text-transform:uppercase;color:var(--acc);margin-bottom:14px;}
.dblk p{font-size:13.5px;color:var(--dim);line-height:1.65;margin-bottom:16px;font-weight:450;letter-spacing:0;}
.dbtn{width:100%;padding:15px;border-radius:13px;font-size:14.5px;font-weight:700;margin-bottom:10px;display:flex;
  align-items:center;gap:12px;letter-spacing:-.01em;}
.dbtn.solid{background:var(--grad);color:#fff;box-shadow:0 6px 16px rgba(0,0,0,.14);}
.dbtn.ghost{background:var(--panel2);color:var(--bone);}
.dbtn svg{width:19px;height:19px;flex:none;}
.dbtn .sm{font-size:11.5px;font-weight:450;color:var(--faint);letter-spacing:0;margin-left:auto;}
.dbtn.solid .sm{color:rgba(255,255,255,.7);}
.steps{list-style:none;counter-reset:s;}
.steps li{counter-increment:s;position:relative;padding:8px 0 8px 34px;font-size:13.5px;color:var(--dim);line-height:1.5;font-weight:450;letter-spacing:0;}
.steps li::before{content:counter(s);position:absolute;left:0;top:7px;width:22px;height:22px;border-radius:50%;
  background:var(--panel2);color:var(--acc);font-size:11px;font-weight:750;display:flex;align-items:center;justify-content:center;}
.steps li b{color:var(--bone);font-weight:600;}
.sync-line{font-size:12.5px;color:var(--faint);margin-top:10px;}
.empty{text-align:center;color:var(--dim);font-size:14px;line-height:1.7;font-weight:450;padding:44px 20px;background:var(--panel);border-radius:20px;box-shadow:var(--shadow);margin-top:8px;}

/* analysis */
.arange{display:flex;gap:5px;background:var(--panel);border-radius:14px;padding:5px;box-shadow:var(--shadow);margin:6px 0 22px;}
.arange button{flex:1;padding:9px 4px;border-radius:10px;font-size:12.5px;font-weight:600;color:var(--dim);}
.arange button.on{background:var(--panel2);color:var(--acc);}
.asec{margin-bottom:20px;background:var(--panel);border-radius:20px;padding:18px;box-shadow:var(--shadow);}
.ahd{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:650;letter-spacing:.16em;text-transform:uppercase;color:var(--acc);margin-bottom:15px;}
.ahd .addmini{margin-left:auto;width:30px;height:30px;border-radius:10px;background:var(--panel2);color:var(--dim);display:flex;align-items:center;justify-content:center;}
.ahd .addmini:active{background:var(--brass-soft);color:var(--acc);}
.big-stat{display:flex;gap:22px;}
.big-stat .s .n{font-size:30px;font-weight:770;letter-spacing:-.04em;line-height:1;}
.big-stat .s .l{font-size:11px;color:var(--dim);font-weight:500;margin-top:6px;}
.vol{display:flex;align-items:baseline;gap:10px;}
.vol .vn{font-size:30px;font-weight:770;letter-spacing:-.03em;}
.vol .vu{font-size:12px;color:var(--faint);font-weight:600;}
.tr{font-size:12px;font-weight:700;margin-left:4px;}
.tr.up,.bd.up,.pa.up{color:var(--green);}
.tr.dn,.bd.dn,.pa.dn{color:var(--red);}
.pa.eq{color:var(--faint);}
.ins{display:flex;gap:11px;align-items:flex-start;font-size:14px;line-height:1.5;color:var(--dim);padding:12px 0;border-bottom:1px solid var(--hair);font-weight:450;}
.ins:last-child{border-bottom:none;}
.ins .dot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex:none;margin-top:6px;}
.ins.good .dot{background:var(--green);}
.ins.warn .dot{background:var(--acc);}
.ins.warn{color:var(--bone);}
.ahint{font-size:11.5px;color:var(--faint);margin-top:13px;line-height:1.5;font-weight:450;}
.bodymap{background:var(--panel2);border-radius:16px;padding:14px 8px 6px;margin-bottom:16px;}
.bodymap svg{width:100%;height:auto;display:block;}
.figlbl{fill:var(--faint);font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-family:var(--fd);}
.mrow{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--hair);}
.mrow:last-child{border-bottom:none;}
.mrow .mg{font-size:13.5px;color:var(--bone);font-weight:500;}
.mrow .mv{font-size:14px;font-weight:750;color:var(--acc3);}
.mrow .mv i{font-style:normal;font-size:11px;color:var(--faint);font-weight:500;}
.wkchart{display:flex;align-items:flex-end;gap:5px;height:96px;padding:4px 2px 0;}
.wkbar{flex:1;height:100%;display:flex;align-items:flex-end;}
.wkfill{width:100%;background:var(--grad);border-radius:4px 4px 2px 2px;min-height:2px;}
.wkfill.z{background:var(--panel2);}
.wkax{display:flex;justify-content:space-between;margin-top:8px;font-size:10.5px;color:var(--faint);font-weight:500;letter-spacing:.02em;}
.prog,.prrow,.mol{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--hair);}
.prog:last-child,.prrow:last-child,.mol:last-child{border-bottom:none;}
.pn{font-size:13.5px;color:var(--bone);font-weight:500;flex:1;min-width:0;}
.pv{font-size:13px;color:var(--dim);font-weight:700;white-space:nowrap;}
.pa{font-weight:700;margin:0 2px;}
.mol{align-items:flex-start;}
.mol .md{font-size:11px;color:var(--acc);font-weight:700;flex:none;padding-top:2px;}
.mol .mn{font-size:13px;color:var(--dim);font-weight:450;line-height:1.45;text-align:right;}
.nudge{display:flex;align-items:center;gap:12px;background:var(--brass-soft);border-radius:14px;padding:13px 15px;margin-bottom:18px;color:var(--acc3);cursor:pointer;}
.nudge svg{flex:none;}
.nudge b{display:block;font-size:13.5px;color:var(--bone);font-weight:650;}
.nudge span{font-size:12px;color:var(--dim);font-weight:450;}

/* body */
.bhero{display:flex;align-items:baseline;gap:16px;margin-bottom:6px;}
.bhero .bw{font-size:52px;font-weight:750;color:var(--bone);letter-spacing:-.03em;line-height:1;}
.bhero .bw i{font-style:normal;font-size:16px;color:var(--faint);font-weight:600;}
.bgoal{font-size:11px;font-weight:650;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);}
.bmeta .bd{font-size:12.5px;font-weight:600;margin-top:4px;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mcell{background:var(--panel);border-radius:14px;padding:14px;box-shadow:var(--shadow);}
.mcell .mcn{font-size:22px;font-weight:750;color:var(--bone);letter-spacing:-.02em;}
.mcell .mcn i{font-style:normal;font-size:12px;color:var(--faint);font-weight:600;}
.mcell .mcl{font-size:11px;color:var(--faint);font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-top:4px;}
.bnow{display:flex;align-items:baseline;gap:14px;margin-bottom:10px;}
.bw{font-size:40px;font-weight:750;color:var(--bone);letter-spacing:-.02em;line-height:1;}
.bw i{font-style:normal;font-size:14px;color:var(--faint);font-weight:600;}
.bd{font-size:12.5px;font-weight:600;}
.spkw{margin:2px 0 18px;}
.spk{width:100%;height:54px;display:block;}
.bentry{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--hair);}
.bentry:last-child{border-bottom:none;}
.bentry .bdate{font-size:11px;color:var(--acc);font-weight:700;flex:none;width:54px;padding-top:2px;}
.bentry .bvals{flex:1;font-size:13px;color:var(--dim);font-weight:450;line-height:1.45;}
.bentry .bvals i{display:block;font-style:normal;color:var(--faint);font-size:12px;margin-top:2px;}
.bdel{color:var(--faint);width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex:none;}
.bdel:active{color:var(--red);}
.rep-txt{width:100%;height:230px;background:var(--panel);border:1px solid var(--line);border-radius:12px;color:var(--bone);font-size:11.5px;padding:13px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.5;resize:vertical;outline:none;margin-bottom:12px;}
.rp-help{font-size:13px;color:var(--dim);margin-bottom:12px;line-height:1.5;font-weight:450;}

/* tab bar — píldora liquid glass */
.tabs{position:fixed;left:0;right:0;bottom:calc(var(--safeb) + 12px);z-index:40;display:flex;justify-content:center;
  background:none;border:none;padding:0;pointer-events:none;box-shadow:none;}
.tabs .inner{pointer-events:auto;position:relative;display:flex;align-items:center;gap:8px;touch-action:none;
  background:var(--glassbar);backdrop-filter:blur(30px) saturate(1.7);-webkit-backdrop-filter:blur(30px) saturate(1.7);
  border:1px solid var(--glassbrd);border-radius:34px;padding:10px 14px;box-shadow:var(--glasshadow);}
.tabind{position:absolute;left:0;top:0;width:52px;height:44px;border-radius:22px;background:var(--panel2);z-index:0;
  transition:transform .3s cubic-bezier(.25,1.35,.4,1),opacity .2s ease;}
.tabs button{position:relative;z-index:1;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  width:52px;height:44px;color:var(--faint);

/* ========================= STORAGE ========================= */
const KEY="rutina_daniel_v1", LEGACY="daniel_fit_v1", SCHEMA=2;
let DB=boot();
function boot(){
  let d=read(KEY);
  if(!d){ const old=read(LEGACY); if(old) d=old; }
  if(!d) d={schemaVersion:SCHEMA,sessions:{},settings:{}};
  return migrate(d);
}
function read(k){ try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;} }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){} if(session && !applyingRemote) scheduleSync(); }
function migrate(d){
  d=d||{};
  if(!d.sessions) d.sessions={};
  d.settings=d.settings||{};
  d.settings.theme=d.settings.theme||"light";
  d.body=d.body||[];
  for(const k in d.sessions){ const s=d.sessions[k]; s.ex=s.ex||{}; s.customIds=s.customIds||[];
    for(const id in s.ex){ const e=s.ex[id]; e.sets=e.sets||[]; e.note=e.note||""; e.done=!!e.done; e.nameKey=e.nameKey||slug(e.name||id); } }
  d.schemaVersion=SCHEMA;
  return d;
}

/* ========================= SYNC (Supabase) ========================= */
function initSync(){
  if(!SYNC_ON) return;
  if(!(window.supabase && window.supabase.createClient)){ syncMsg="Sin conexión a la nube."; return; }
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  sb.auth.getSession().then(({data})=>{ session=(data&&data.session)||null; if(session) afterLogin(); else if(V.t==='data') renderData(); });
  sb.auth.onAuthStateChange((_e,s)=>{ session=s||null; if(V.t==='data') renderData(); });
  window.addEventListener('online',()=>{ if(session) pullRemote(); });
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden && session) pullRemote(); });
}
async function doSignIn(email,pw,btn){
  if(!sb){ syncMsg="Sync no disponible."; updateSyncLine(); return; }
  if(!email||!pw){ syncMsg="Escribe correo y contraseña."; updateSyncLine(); return; }
  syncMsg="Entrando…"; updateSyncLine(); if(btn) btn.disabled=true;
  const {error}=await sb.auth.signInWithPassword({email:String(email).trim(),password:pw});
  if(btn) btn.disabled=false;
  if(error){ syncMsg="No se pudo entrar: "+error.message; if(V.t==='data') renderData(); return; }
  const {data}=await sb.auth.getSession(); session=(data&&data.session)||null;
  await afterLogin();
}
async function afterLogin(){ await pullRemote(); await pushRemote(); if(V.t==='data') renderData(); }
async function doSignOut(){ try{ if(sb) await sb.auth.signOut(); }catch(e){} session=null; if(V.t==='data') renderData(); }
async function pullRemote(){
  if(!sb||!session) return;
  syncMsg="Sincronizando…"; updateSyncLine();
  try{
    const {data,error}=await sb.from('workout_data').select('data').eq('id',session.user.id).maybeSingle();
    if(error){ syncMsg="Error: "+error.message; updateSyncLine(); return; }
    if(data && data.data){ applyingRemote=true; DB=migrate(mergeDB(DB,data.data)); try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){} applyingRemote=false; render(); }
    syncMsg="Sincronizado"; updateSyncLine();
  }catch(e){ syncMsg="Sin conexión."; updateSyncLine(); }
}
async function pushRemote(){
  if(!sb||!session) return;
  DB.updatedAt=Date.now();
  const clean={schemaVersion:DB.schemaVersion,settings:DB.settings||{},updatedAt:DB.updatedAt,sessions:{}};
  for(const k in DB.sessions){ if(isTrained(DB.sessions[k])) clean.sessions[k]=DB.sessions[k]; }
  try{
    const {error}=await sb.from('workout_data').upsert({id:session.user.id,data:clean,updated_at:new Date().toISOString()});
    syncMsg=error?("Error: "+error.message):"Sincronizado"; updateSyncLine();
  }catch(e){ syncMsg="Sin conexión."; updateSyncLine(); }
}
function scheduleSync(){ if(!sb||!session) return; clearTimeout(pushTimer); syncMsg="Sincronizando…"; updateSyncLine(); pushTimer=setTimeout(pushRemote,1500); }
function mergeDB(local,remote){
  local=local||{}; remote=remote||{};
  const out={schemaVersion:Math.max(local.schemaVersion||1,remote.schemaVersion||1),
    sessions:{}, settings:Object.assign({},remote.settings||{},local.settings||{}),
    updatedAt:Math.max(local.updatedAt||0,remote.updatedAt||0)};
  const ls=local.sessions||{}, rs=remote.sessions||{};
  const keys=new Set(Object.keys(ls).concat(Object.keys(rs)));
  keys.forEach(k=>{ const a=ls[k], b=rs[k]; out.sessions[k]=(a&&b)?richerSession(a,b):(a||b); });
  return out;
}
function richerSession(a,b){
  const sc=s=>Object.values((s&&s.ex)||{}).reduce((n,e)=>n+(e.done?1:0)+(((e.sets)||[]).filter(x=>x.reps).length),0);
  return sc(b)>sc(a)? b : a;
}
function updateSyncLine(){ const el=document.getElementById('syncline'); if(el) el.textContent=syncMsg; }
function uiSignIn(btn){ const e=document.getElementById('sy-email'), p=document.getElementById('sy-pass'); doSignIn(e?e.value:"", p?p.value:"", btn); }
function uiSignOut(){ doSignOut(); }

  let inner;

    inner='<p>Aún no está conectada. Sigue los pasos para enlazar tu cuenta y ver lo mismo en el celular y en la computadora. Mientras tanto, tu progreso se guarda en este dispositivo.</p>';

    inner='<p>Entra con tu correo y contraseña para sincronizar este dispositivo con los demás.</p>'+
      '<div class="field"><div class="fl">Correo</div><input id="sy-email" inputmode="email" autocomplete="username" placeholder="tu@correo.com"></div>'+
      '<div class="field"><div class="fl">Contraseña</div><input id="sy-pass" type="password" autocomplete="current-password" placeholder="••••••••"></div>'+
      '<button class="dbtn solid" onclick="uiSignIn(this)">'+ico('up')+' Entrar y sincronizar</button>'+
      '<p id="syncline" style="color:var(--faint);margin-top:8px">'+esc(syncMsg)+'</p>';
  } else {
    inner='<p>Conectado como <b>'+esc((session.user&&session.user.email)||'tu cuenta')+'</b>. Tus registros se sincronizan solos entre tus dispositivos.</p>'+
      '<button class="dbtn ghost" onclick="pullRemote()">'+ico('down')+' Sincronizar ahora <span class="sm" id="syncline">'+esc(syncMsg)+'</span></button>'+
      '<button class="dbtn ghost" onclick="uiSignOut()">Cerrar sesión</button>';
  }
  return '<div class="dblk"><h3>Sincronización</h3>'+inner+'</div>';
}

/* ========================= HELPERS ========================= */
function today(){const d=new Date();return iso(d);}
function iso(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parseD(s){return new Date(s+"T12:00:00");}
function slug(s){return String(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");}
function eid(day,name){return day+"::"+slug(name);}
function longDate(s){return parseD(s).toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"});}
function shortDate(s){return parseD(s).toLocaleDateString("es-MX",{day:"numeric",month:"short"});}
function daysAgo(s){const a=parseD(today()),b=parseD(s);return Math.round((a-b)/86400000);}
function agoTxt(n){return n<=0?"hoy":n===1?"ayer":"hace "+n+" días";}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function b64e(s){return btoa(unescape(encodeURIComponent(s)));}
function b64d(s){return decodeURIComponent(escape(atob(s)));}

function skey(date,day){return date+"_"+day;}
function getSession(date,day,create){
  const k=skey(date,day);
  if(!DB.sessions[k]){ if(!create) return null; DB.sessions[k]={date,day,ex:{},customIds:[]}; }
  return DB.sessions[k];
}
function seedEx(s,day,it,kind,superset,sectionLabel){
  const id=eid(day,it[0]);
  if(!s.ex[id]) s.ex[id]={nameKey:slug(it[0]),name:it[0],muscle:it[1],
    target:{sets:it[2],reps:it[3],weight:it[4]},instr:it[5],kind,superset:!!superset,sectionLabel,custom:false,sets:[],done:false,note:""};
  return {id,e:s.ex[id]};
}
function isTrained(s){return Object.values(s.ex).some(e=>e.done||(e.sets&&e.sets.some(x=>x.reps)));}
function trainedList(){
  return Object.keys(DB.sessions).map(k=>DB.sessions[k]).filter(isTrained)
    .sort((a,b)=>a.date<b.date?1:-1);
}
function trainedOn(date){
  for(const k in DB.sessions){const s=DB.sessions[k]; if(s.date===date&&isTrained(s)) return s.day;}
  return null;
}
function lastTime(nameKey,exceptKey){
  const keys=Object.keys(DB.sessions).sort((a,b)=>a<b?1:-1);
  for(const k of keys){
    if(k===exceptKey) continue;
    const s=DB.sessions[k];
    for(const id in s.ex){
      const e=s.ex[id];
      if(e.nameKey!==nameKey||!e.sets) continue;
      const w=e.sets.filter(x=>x.reps);
      if(!w.length) continue;
      let best=w[0];
      w.forEach(x=>{const a=parseFloat(x.weight)||0,c=parseFloat(best.weight)||0;
        if(a>c||(a===c&&(parseFloat(x.reps)||0)>(parseFloat(best.reps)||0)))best=x;});
      return {set:best,date:s.date};
    }
  }
  return null;
}

function exItem(id,e,log){
  const t=e.target;const tgt=t.sets+'×'+t.reps+(t.weight&&t.weight!=='—'?' · '+t.weight+(/[a-z]/i.test(t.weight)?'':' kg'):'');

function logArea(id,e){

  if(!e.sets.length){const n=parseInt(e.target.sets)||3;for(let i=0;i<n;i++)e.sets.push({reps:"",weight:"",rpe:""});}

function setRow(id,i,st,e){
  const rph=defReps(e), wph=defWeight(e);
  return '<div class="setg"><span class="sn tab-num">'+(i+1)+'</span>'+
    '<div class="stp2"><b onclick="nudge(\''+id+'\','+i+',\'reps\',-1)">−</b>'+
      '<input class="tab-num" inputmode="numeric" value="'+(st.reps||"")+'" placeholder="'+(rph||"–")+'" onfocus="fFocus(\''+id+'\','+i+',\'reps\',this)" onchange="setVal(\''+id+'\','+i+',\'reps\',this.value)">'+
      '<b onclick="nudge(\''+id+'\','+i+',\'reps\',1)">+</b></div>'+
    '<div class="stp2"><b onclick="nudge(\''+id+'\','+i+',\'weight\',-0.5)">−</b>'+
      '<input class="tab-num" inputmode="decimal" value="'+(st.weight||"")+'" placeholder="'+(wph||"–")+'" onfocus="fFocus(\''+id+'\','+i+',\'weight\',this)" onchange="setVal(\''+id+'\','+i+',\'weight\',this.value)">'+
      '<b onclick="nudge(\''+id+'\','+i+',\'weight\',0.5)">+</b></div>'+
    '<div class="rp2"><b onclick="nudge(\''+id+'\','+i+',\'rpe\',-1)">−</b><span class="tab-num'+(st.rpe?'':' e')+'">'+(st.rpe?String(st.rpe):'–')+'</span><b onclick="nudge(\''+id+'\','+i+',\'rpe\',1)">+</b></div>'+
  '</div>';
}
function defReps(e){const m=String(e.target.reps||"").match(/\d+/);return m?m[0]:"";}
function defWeight(e){const w=String(e.target.weight||"").trim();return /^\d+(\.\d+)?$/.test(w)?w:"";}
function curEx(id){const s=getSession(V.date,V.day,true);return s.ex[id];}
function toggleOpen(id){const el=document.getElementById("x-"+id);if(!el)return;
  const before=el.getBoundingClientRect().top;
  if(openSet.has(id))openSet.delete(id);else openSet.add(id);
  el.classList.toggle("open");
  const after=el.getBoundingClientRect().top;
  const dy=after-before;if(dy)window.scrollBy(0,dy);}
function toggleDone(id){const e=curEx(id);e.done=!e.done;save();const y=window.scrollY||window.pageYOffset||0;renderDay();window.scrollTo(0,y);}
function deleteDay(){if(!confirm("¿Borrar este día del historial? Se elimina todo lo registrado en esta sesión."))return;

function setNote(id,v){curEx(id).note=v;save();}
function toggleNote(id,btn){const nt=btn.parentElement.querySelector('.nt');if(!nt)return;nt.classList.toggle('shown');if(nt.classList.contains('shown'))setTimeout(()=>nt.focus(),30);}
function setVal(id,i,f,v){const e=curEx(id);if(e.sets[i]){e.sets[i][f]=String(v).trim();save();}}
function fFocus(id,i,f,el){const e=curEx(id);if(!e.sets[i])return;
  if(e.sets[i][f]===""||e.sets[i][f]==null){const d=f==="reps"?defReps(e):defWeight(e);if(d!==""){e.sets[i][f]=d;el.value=d;save();}}
  try{el.select();}catch(_){}}
function nudge(id,i,f,dl){const e=curEx(id);if(!e.sets[i])return;const cur=e.sets[i][f];
  if(cur===""||cur==null||isNaN(parseFloat(cur))){
    let d=f==="reps"?defReps(e):f==="weight"?defWeight(e):8;
    if(d===""||d==null)d=f==="weight"?(dl>0?0.5:0):(dl>0?1:0);
    e.sets[i][f]=(f==="weight")?parseFloat(d):(f==="rpe"?Math.min(10,Math.max(6,parseInt(d))):parseInt(d));
  }else{
    let n=parseFloat(cur)+dl;
    if(f==="rpe")n=Math.min(10,Math.max(6,n));
    e.sets[i][f]=(f==="weight")?Math.max(0,Math.round(n*2)/2):Math.max(0,Math.round(n));
  }
  save();refreshSets(id);}
function addSet(id){const e=curEx(id);const l=e.sets[e.sets.length-1]||{};e.sets.push({reps:"",weight:l.weight||"",rpe:""});save();refreshSets(id);}
function removeSet(id){const e=curEx(id);if(e.sets.length>1){e.sets.pop();save();refreshSets(id);}}
function refreshSets(id){const box=document.getElementById("sets-"+id);if(!box)return;const e=curEx(id);box.innerHTML=e.sets.map((st,i)=>setRow(id,i,st,e)).join("");
  const ex=document.getElementById("x-"+id);if(ex){const rm=ex.querySelector(".serctl button");if(rm)rm.disabled=e.sets.length<=1;}}

function fmtT(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

  TMR.int=setInterval(()=>{TMR.rem--;drawT();fabT();if(TMR.rem<=0){stopT();ding();}},1000);}
function stopT(){if(TMR.int)clearInterval(TMR.int);TMR.int=null;TMR.run=false;TMR.rem=0;fabT();drawT();}
function fabT(){const f=document.getElementById("fabt");if(f)f.textContent=TMR.run?fmtT(TMR.rem):"Descanso";}
function ding(){if(navigator.vibrate)navigator.vibrate([180,90,180]);
  try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=784;g.gain.setValueAtTime(.18,a.currentTime);o.start();g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.5);o.stop(a.currentTime+.5);}catch(e){}
  const d=document.getElementById("tD");if(d)d.textContent="Listo";}

function calendar(){

  const t=today();
  for(let d=1;d<=dim;d++){
    const ds=y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

function expCSV(){

    });

  const csv="\uFEFF"+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\r\n");
  dl("historial-rutina-"+today()+".csv",csv,"text/csv;charset=utf-8");

let anRange="30"; // 7 | 30 | 90 | all
function stripAcc(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
const MUSGRP=[
  [/biceps|braq/,"Bíceps"],[/triceps/,"Tríceps"],[/pecho/,"Pecho"],
  [/hombro/,"Hombros"],[/espalda|dorsal|trapecio|remo/,"Espalda"],
  [/cuadriceps|cuad|vmo/,"Cuádriceps"],[/isquio|gluteo/,"Glúteos e isquios"],
  [/pantorrilla|gemelo/,"Pantorrillas"],[/antebrazo|agarre|muneca/,"Antebrazo"],
  [/core|abdom|lumbar|estabil|oblicuo|bird|dead/,"Core"]
];
function musGroup(m){
  const first=stripAcc(String(m||"").split("/")[0]); const whole=stripAcc(m);
  for(const [re,g] of MUSGRP){ if(re.test(first)) return g; }
  for(const [re,g] of MUSGRP){ if(re.test(whole)) return g; }
  return "Otro";
}
function rangeDays(r){return r==="7"?7:r==="30"?30:r==="90"?90:null;}
function rangeLabel(r){return r==="7"?"últimos 7 días":r==="30"?"últimos 30 días":r==="90"?"últimos 90 días":"todo el historial";}
function inRange(dateStr,r){const d=rangeDays(r);return d==null?true:daysAgo(dateStr)<d;}
function sessionsIn(r){return trainedList().filter(s=>inRange(s.date,r));}
function bestSet(sets){const w=(sets||[]).filter(x=>x.reps);if(!w.length)return null;let b=w[0];
  w.forEach(x=>{const a=parseFloat(x.weight)||0,c=parseFloat(b.weight)||0;if(a>c||(a===c&&(parseFloat(x.reps)||0)>(parseFloat(b.reps)||0)))b=x;});return b;}
function analyze(r){
  const ss=sessionsIn(r);const byMuscle={};let totVol=0,totSets=0,totReps=0;const exMap={};
  ss.forEach(s=>{Object.values(s.ex).forEach(e=>{
    const logged=(e.sets||[]).filter(x=>x.reps);if(!logged.length)return;
    const g=musGroup(e.muscle);let vol=0;logged.forEach(x=>vol+=(parseFloat(x.weight)||0)*(parseFloat(x.reps)||0));
    const reps=logged.reduce((a,x)=>a+(parseFloat(x.reps)||0),0);
    byMuscle[g]=byMuscle[g]||{sets:0,vol:0,reps:0};byMuscle[g].sets+=logged.length;byMuscle[g].vol+=vol;byMuscle[g].reps+=reps;
    totVol+=vol;totSets+=logged.length;totReps+=reps;
    const nk=e.nameKey||slug(e.name);exMap[nk]=exMap[nk]||{name:e.name,muscle:e.muscle,entries:[]};
    exMap[nk].entries.push({date:s.date,best:bestSet(e.sets),sets:logged.length,vol});
  });});
  let weeks;const d=rangeDays(r);
  if(d)weeks=d/7;else{if(ss.length){const oldest=ss.reduce((m,s)=>s.date<m?s.date:m,ss[0].date);weeks=Math.max(1,(daysAgo(oldest)+1)/7);}else weeks=1;}
  return {ss,byMuscle,totVol,totSets,totReps,weeks,exMap};
}
function prevWindowVol(r){const d=rangeDays(r);if(!d)return null;let vol=0;
  trainedList().forEach(s=>{const ago=daysAgo(s.date);if(ago>=d&&ago<2*d){Object.values(s.ex).forEach(e=>{(e.sets||[]).filter(x=>x.reps).forEach(x=>vol+=(parseFloat(x.weight)||0)*(parseFloat(x.reps)||0));});}});return vol;}
function allPRs(){const pr={};
  trainedList().forEach(s=>{Object.values(s.ex).forEach(e=>{const b=bestSet(e.sets);if(!b)return;const nk=e.nameKey||slug(e.name);const w=parseFloat(b.weight)||0;
    if(!pr[nk]||w>pr[nk].w||(w===pr[nk].w&&(parseFloat(b.reps)||0)>pr[nk].reps))pr[nk]={name:e.name,w,reps:parseFloat(b.reps)||0,weight:b.weight,rawReps:b.reps,date:s.date,rpe:b.rpe};});});
  return Object.values(pr).filter(p=>p.w>0).sort((a,b)=>b.w-a.w);}
const MOLRE=/(dolor|duele|molest|incomod|trono|truena|tiron|calambre|punz|rigid|tension|inflam|pinch|jalon)/;
function molestias(r){const out=[];
  sessionsIn(r).forEach(s=>{Object.values(s.ex).forEach(e=>{if(e.note&&MOLRE.test(stripAcc(e.note)))out.push({date:s.date,name:e.name,note:e.note});});});
  return out.sort((a,b)=>a.date<b.date?1:-1);}
function genInsights(r){
  const A=analyze(r);const out=[];
  const priority=["Bíceps","Tríceps","Hombros","Espalda","Pecho","Cuádriceps","Glúteos e isquios","Pantorrillas"];
  const isArmShoulderBack=g=>["Bíceps","Tríceps","Hombros","Espalda"].includes(g);
  priority.forEach(g=>{const m=A.byMuscle[g];const spw=m?m.sets/A.weeks:0;
    if(spw<0.5){if(isArmShoulderBack(g)&&A.ss.length)out.push({t:'warn',txt:g+': casi sin volumen. Es de tus prioridades — súmale series.'});}
    else if(spw<6)out.push({t:'warn',txt:g+': ~'+spw.toFixed(0)+' series/semana, por debajo del rango ideal (10–20). Agrega 1–2 series.'});
    else if(spw<10)out.push({t:'info',txt:g+': ~'+spw.toFixed(0)+' series/semana, un poco corto. Puedes subir hacia 10–20.'});
    else if(spw<=20)out.push({t:'good',txt:g+': ~'+spw.toFixed(0)+' series/semana, dentro del rango ideal.'});
    else out.push({t:'info',txt:g+': ~'+spw.toFixed(0)+' series/semana, alto. Vigila recuperación y calidad.'});});
  const spw=A.ss.length/A.weeks;
  if(!A.ss.length)out.push({t:'info',txt:'Aún no hay entrenamientos en este periodo.'});
  else if(spw<2.3)out.push({t:'warn',txt:'Constancia: ~'+spw.toFixed(1)+' sesiones/semana. Tu plan pide 3 — intenta cerrar la semana.'});
  else out.push({t:'good',txt:'Constancia: ~'+spw.toFixed(1)+' sesiones/semana. Buen ritmo.'});
  Object.values(A.exMap).forEach(x=>{if(x.entries.length>=3){
    const e=x.entries.slice().sort((a,b)=>a.date<b.date?-1:1);const last3=e.slice(-3).map(y=>parseFloat(y.best&&y.best.weight)||0);
    if(last3[0]>0&&last3.every(v=>v===last3[0]))out.push({t:'info',txt:x.name+': mismo peso ('+last3[0]+' kg) 3 sesiones seguidas. Si llegas al tope de reps, sube '+(last3[0]<10?'0.5':'2.5')+' kg.'});}});
  ORDER.forEach(day=>{let last=null;for(const s of trainedList()){if(s.day===day){last=s.date;break;}}if(last===null)return;
    const ago=daysAgo(last);const dn=R[day]?R[day].name:day;if(ago>=9)out.push({t:'warn',txt:'Día '+day+' ('+dn+'): sin entrenar hace '+ago+' días. No lo dejes caer.'});});
  allPRs().forEach(p=>{if(daysAgo(p.date)<=10)out.push({t:'good',txt:'¡Récord reciente! '+p.name+': '+p.weight+' kg × '+p.rawReps+'.'});});
  const cnt={};molestias("all").forEach(m=>cnt[m.name]=(cnt[m.name]||0)+1);
  Object.keys(cnt).forEach(n=>{if(cnt[n]>=2)out.push({t:'warn',txt:'Molestia recurrente en "'+n+'" ('+cnt[n]+'×). Revisa técnica, carga o movilidad.'});});
  const rank={warn:0,good:1,info:2};return out.sort((a,b)=>rank[a.t]-rank[b.t]).slice(0,14);
}
function sparkline(vals){
  if(vals.length<2)return "";const w=280,h=54,pad=7;const min=Math.min(...vals),max=Math.max(...vals);const rng=(max-min)||1;
  const pts=vals.map((v,i)=>{const x=pad+(w-2*pad)*i/(vals.length-1);const y=pad+(h-2*pad)*(1-(v-min)/rng);return x.toFixed(1)+","+y.toFixed(1);});
  const last=pts[pts.length-1].split(",");
  return '<svg class="spk" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><polyline points="'+pts.join(" ")+'" fill="none" stroke="var(--brass)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+last[0]+'" cy="'+last[1]+'" r="3.2" fill="var(--brass-2)"/></svg>';
}

  html+='<button class="dbtn solid" style="margin-top:8px" onclick="openReport(anRange)">'+ico('up')+' Exportar para revisión</button>';

}

function mixHex(a,b,t){const p=x=>parseInt(x,16);const A=[p(a.slice(1,3)),p(a.slice(3,5)),p(a.slice(5,7))],B=[p(b.slice(1,3)),p(b.slice(3,5)),p(b.slice(5,7))];return "#"+A.map((v,i)=>Math.round(v+(B[i]-v)*t).toString(16).padStart(2,"0")).join("");}
function bodyHeat(A){
  const bm=A.byMuscle;const max=Math.max(1,...Object.keys(bm).map(g=>bm[g].sets));
  const BASE="#39372c",STRUCT="#242219",LO="#6f6a52",MID="#d8a24a",HI="#c0553a";
  function col(m){if(BODYSTRUCT.has(m))return STRUCT;const g=BODYMAP[m];if(!g)return BASE;const s=bm[g]?bm[g].sets:0;if(!s)return BASE;const lv=Math.min(1,s/max);return lv<0.5?mixHex(LO,MID,lv/0.5):mixHex(MID,HI,(lv-0.5)/0.5);}
  const polys=data=>data.map(d=>{const c=col(d.m);return d.p.map(pt=>'<polygon points="'+pt+'" fill="'+c+'" stroke="#141310" stroke-width="0.4"/>').join("");}).join("");
  return '<div class="bodymap"><svg viewBox="0 0 230 214" xmlns="http://www.w3.org/2000/svg">'+
    '<g transform="translate(6,4)">'+polys(BODYSVG.a)+'</g>'+

    '</svg></div>';
}
function weeklyVol(r){
  let n;const d=rangeDays(r);const list=trainedList();
  if(d)n=Math.min(12,Math.max(2,Math.ceil(d/7)));
  else{if(list.length){const oldest=list.reduce((m,s)=>daysAgo(s.date)>m?daysAgo(s.date):m,0);n=Math.min(12,Math.max(2,Math.ceil((oldest+1)/7)));}else n=4;}
  const bk=new Array(n).fill(0);
  list.forEach(s=>{const wk=Math.floor(daysAgo(s.date)/7);if(wk>=0&&wk<n){let v=0;Object.values(s.ex).forEach(e=>(e.sets||[]).filter(x=>x.reps).forEach(x=>v+=(parseFloat(x.weight)||0)*(parseFloat(x.reps)||0)));bk[wk]+=v;}});
  return {bars:bk.slice().reverse(),n};
}
function weekChart(wk){const max=Math.max(1,...wk.bars);
  const bars=wk.bars.map(v=>{const h=v>0?Math.max(9,Math.round(v/max*100)):2;return '<div class="wkbar"><div class="wkfill'+(v>0?'':' z')+'" style="height:'+h+'%"></div></div>';}).join("");
  return '<div class="wkchart">'+bars+'</div><div class="wkax"><span>hace '+wk.bars.length+' sem</span><span>esta semana</span></div>';}

function buildReport(r){
  const A=analyze(r);const pr=allPRs();const mol=molestias(r);const ins=genInsights(r);const L=[];
  L.push("# Reporte de entrenamiento — Daniel");L.push("");
  L.push("**Periodo:** "+rangeLabel(r)+"  ·  **Generado:** "+today());L.push("");
  L.push("**Contexto:** ectomorfo, 1.81 m, meta 75→77 kg. Prioridades: 1) brazos (bíceps/tríceps), 2) hombros, 3) espalda, 4) abdomen, 5) movilidad, 6) fuerza funcional, 7) pantorrillas, 8) reducir pecho. Entrena en casa con mancuernas (usualmente 7.5 kg/mano), 3 días Empuje/Pierna/Jale.");L.push("");
  const spw=A.ss.length/A.weeks;
  L.push("## Resumen");
  L.push("- Sesiones: "+A.ss.length+" ("+spw.toFixed(1)+"/semana)");
  L.push("- Volumen total: "+Math.round(A.totVol)+" kg·rep · "+A.totSets+" series · "+A.totReps+" reps");
  const pv=prevWindowVol(r);if(pv!=null&&pv>0){const dp=Math.round((A.totVol-pv)/pv*100);L.push("- Tendencia de volumen vs periodo anterior: "+(dp>=0?"+":"")+dp+"%");}
  L.push("");
  L.push("## Series por grupo muscular (series/semana)");
  const groups=Object.keys(A.byMuscle).sort((a,b)=>A.byMuscle[b].sets-A.byMuscle[a].sets);const dias=rangeDays(r);
  if(!groups.length)L.push("- (sin series registradas)");
  groups.forEach(g=>{const m=A.byMuscle[g];const s=m.sets/A.weeks;let flag="";if(dias){if(s<10)flag=" — por debajo de 10–20";else if(s>20)flag=" — por encima de 20";else flag=" — dentro de 10–20";}
    L.push("- "+g+": "+m.sets+" series"+(dias?" ("+s.toFixed(1)+"/sem)":"")+flag+" · "+Math.round(m.vol)+" kg·rep");});
  L.push("");
  L.push("## Progresión por ejercicio (primer → último registro del periodo)");
  const prog=Object.values(A.exMap).filter(x=>x.entries.length>=2);
  if(!prog.length)L.push("- (aún sin suficientes datos para comparar)");
  prog.forEach(x=>{const e=x.entries.slice().sort((a,b)=>a.date<b.date?-1:1);const f=e[0].best,l=e[e.length-1].best;if(!f||!l)return;const fw=parseFloat(f.weight)||0,lw=parseFloat(l.weight)||0;const ar=lw>fw?"▲":lw<fw?"▼":"=";
    L.push("- "+x.name+": "+(f.weight||"—")+" kg × "+(f.reps||"—")+" → "+(l.weight||"—")+" kg × "+(l.reps||"—")+"  "+ar);});
  L.push("");
  L.push("## Récords personales (histórico)");
  if(!pr.length)L.push("- (sin récords con peso aún)");
  pr.slice(0,12).forEach(p=>L.push("- "+p.name+": "+p.weight+" kg × "+p.rawReps+(p.rpe?" · RPE "+p.rpe:"")+" ("+shortDate(p.date)+")"));
  L.push("");
  L.push("## Molestias registradas en el periodo");
  if(!mol.length)L.push("- (ninguna)");
  mol.forEach(m=>L.push("- "+shortDate(m.date)+" · "+m.name+": "+m.note));
  L.push("");
  L.push("## Señales automáticas de la app");
  ins.forEach(i=>L.push("- ["+(i.t==='warn'?'!':i.t==='good'?'ok':'·')+"] "+i.txt));
  L.push("");
  if((DB.body||[]).length){const b=DB.body.slice().sort((a,b)=>a.date<b.date?-1:1);const last=b[b.length-1],first=b[0];
    L.push("## Cuerpo");
    L.push("- Último ("+shortDate(last.date)+"): "+[last.weight&&last.weight+" kg",last.arm&&"brazo "+last.arm,last.shoulder&&"hombro "+last.shoulder,last.chest&&"pecho "+last.chest,last.waist&&"cintura "+last.waist].filter(Boolean).join(" · "));
    if(first!==last&&first.weight&&last.weight)L.push("- Peso: "+first.weight+" → "+last.weight+" kg desde "+shortDate(first.date));L.push("");}
  L.push("---");
  L.push("Con base en estos datos, dame feedback como coach: qué está funcionando, qué ajustar (peso, reps o ejercicios), en qué grupo muscular enfocarme más según mis prioridades, si conviene cambiar algún ejercicio, y cuándo hacer una semana de descarga (deload). Sé específico.");
  return L.join("\n");
}

function moveTabInd(){
  var tb=document.getElementById("tabs"), ind=document.getElementById("tabind"); if(!tb||!ind) return;
  var on=tb.querySelector("button.on"); if(!on){ ind.style.opacity="0"; return; }
  ind.style.opacity="1"; ind.style.transform="translate("+on.offsetLeft+"px,"+on.offsetTop+"px)";
}
renderTabs();
/* deslizar el dedo sobre la píldora: el indicador te sigue y hace snap con resorte */
var __tabDrag=false;
(function(){
  var tb=document.getElementById("tabs"); if(!tb) return;
  var drag=null;
  function btns(){ return tb.querySelectorAll("button"); }
  tb.addEventListener("touchstart",function(ev){ var t=ev.touches[0]; drag={x0:t.clientX,moved:false}; },{passive:true});
  tb.addEventListener("touchmove",function(ev){
    if(!drag) return; var t=ev.touches[0];
    if(!drag.moved && Math.abs(t.clientX-drag.x0)<6) return;
    drag.moved=true; __tabDrag=true;
    var ind=document.getElementById("tabind"), bs=btns(); if(!ind||!bs.length) return;
    var r=tb.getBoundingClientRect(), first=bs[0], last=bs[bs.length-1];
    var x=Math.max(first.offsetLeft, Math.min(last.offsetLeft, t.clientX-r.left-26));
    ind.style.transition="none"; ind.style.transform="translate("+x+"px,"+first.offsetTop+"px)";
    var best=0,bd=1e9;
    for(var i=0;i<bs.length;i++){ var c=bs[i].offsetLeft+26; var dd=Math.abs(c-(x+26)); if(dd<bd){bd=dd;best=i;} }
    var cur=(V.t==="day"?(V.from||"home"):V.t);
    if(TAB_ORDER[best]!==cur){ go({t:TAB_ORDER[best]}); }
  },{passive:true});
  tb.addEventListener("touchend",function(){
    if(drag&&drag.moved){ __tabDrag=false; var ind=document.getElementById("tabind"); if(ind) ind.style.transition=""; moveTabInd(); }
    drag=null; __tabDrag=false;
  },{passive:true});
})();
/* Escape cierra overlays abiertos (PC) */
document.addEventListener("keydown",function(e){
  if(e.key==="Escape"){ var ov=document.querySelector(".ov.on:not(.closing)"); if(ov) closeOv(ov.id); }
});
window.addEventListener("resize",moveTabInd);

applyTheme();
render();
initSync();

</script>
</body>
</html>
